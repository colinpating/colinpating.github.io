<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Loke Predictions</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222636;
      --border: #2a2e42;
      --green: #00c076;
      --green-dim: #0a2e1f;
      --red: #ef4444;
      --red-dim: #2e0f0f;
      --text: #f0f2f8;
      --muted: #8b90a8;
      --accent: #6c7dff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      background: var(--green-dim);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .market-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .market-meta {
      padding: 12px 20px;
      display: flex;
      gap: 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .meta-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .wallet-banner {
      margin: 16px 16px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wallet-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .wallet-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .wallet-balance {
      font-size: 22px;
      font-weight: 800;
      color: var(--green);
    }

    .wallet-balance.low {
      color: var(--red);
    }

    .wallet-cost {
      font-size: 11px;
      color: var(--muted);
    }

    .content {
      padding: 12px 16px 100px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 4px;
    }

    .option-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      transition: border-color 0.15s;
    }

    .option-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .option-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .option-prob {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
    }

    .prob-bar-track {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .prob-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--green);
      transition: width 0.4s ease;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn {
      padding: 11px 0;
      border-radius: 9px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn:not(:disabled):active { transform: scale(0.96); opacity: 0.85; }
    .btn-yes { background: var(--green); color: #fff; }
    .btn-no { background: var(--red); color: #fff; }
    .btn-label { font-size: 13px; font-weight: 700; }
    .btn-cost { font-size: 11px; font-weight: 500; opacity: 0.85; }

    .toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .bottom-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .status-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .share-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 20px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .share-btn:active { opacity: 0.8; }

    .connecting {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 24px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <span class="logo">Loke Predictions</span>
      <span class="live-badge"><span class="live-dot"></span>Live</span>
    </div>
    <div class="market-title">Next in the Loke family to get married</div>
  </div>

  <div class="market-meta">
    <div class="meta-item">
      <span class="meta-label">Closes</span>
      <span class="meta-value">Dec 31, 2030</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Traders</span>
      <span class="meta-value" id="trader-count">—</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Volume</span>
      <span class="meta-value" id="total-volume">—</span>
    </div>
  </div>

  <div class="wallet-banner">
    <div class="wallet-left">
      <span class="wallet-label">Your balance</span>
      <span class="wallet-balance" id="wallet-balance">100¢</span>
    </div>
    <span class="wallet-cost" id="wallet-cost">Each bet costs 10¢</span>
  </div>

  <div class="content">
    <div class="section-label">Candidates</div>

    <div class="option-card" id="card-adam">
      <div class="option-top">
        <span class="option-name">Adam</span>
        <span class="option-prob" id="prob-adam">—</span>
      </div>
      <div class="prob-bar-track">
        <div class="prob-bar-fill" id="bar-adam" style="width:0%"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-yes" id="btn-yes-adam" onclick="placeBet('adam','yes')" disabled>
          <span class="btn-label">Yes</span>
          <span class="btn-cost">10¢</span>
        </button>
        <button class="btn btn-no" id="btn-no-adam" onclick="placeBet('adam','no')" disabled>
          <span class="btn-label">No</span>
          <span class="btn-cost">10¢</span>
        </button>
      </div>
    </div>

    <div class="option-card" id="card-paulo">
      <div class="option-top">
        <span class="option-name">Paulo</span>
        <span class="option-prob" id="prob-paulo">—</span>
      </div>
      <div class="prob-bar-track">
        <div class="prob-bar-fill" id="bar-paulo" style="width:0%"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-yes" id="btn-yes-paulo" onclick="placeBet('paulo','yes')" disabled>
          <span class="btn-label">Yes</span>
          <span class="btn-cost">10¢</span>
        </button>
        <button class="btn btn-no" id="btn-no-paulo" onclick="placeBet('paulo','no')" disabled>
          <span class="btn-label">No</span>
          <span class="btn-cost">10¢</span>
        </button>
      </div>
    </div>

    <div class="option-card" id="card-sophia">
      <div class="option-top">
        <span class="option-name">Sophia</span>
        <span class="option-prob" id="prob-sophia">—</span>
      </div>
      <div class="prob-bar-track">
        <div class="prob-bar-fill" id="bar-sophia" style="width:0%"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-yes" id="btn-yes-sophia" onclick="placeBet('sophia','yes')" disabled>
          <span class="btn-label">Yes</span>
          <span class="btn-cost">10¢</span>
        </button>
        <button class="btn btn-no" id="btn-no-sophia" onclick="placeBet('sophia','no')" disabled>
          <span class="btn-label">No</span>
          <span class="btn-cost">10¢</span>
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="bottom-bar">
    <div class="bottom-bar-inner">
      <div class="status-info">
        <span class="status-label">Status</span>
        <span class="status-value" id="status-value">Connecting...</span>
      </div>
      <button class="share-btn" onclick="shareMarket()">Share</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, ref, onValue, runTransaction, increment, set, get } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCqQVsWX_74mmx8bwjBxDAm4xEmIcvR3GM",
      authDomain: "loke-prediction.firebaseapp.com",
      databaseURL: "https://loke-prediction-default-rtdb.firebaseio.com",
      projectId: "loke-prediction",
      storageBucket: "loke-prediction.firebasestorage.app",
      messagingSenderId: "763517146782",
      appId: "1:763517146782:web:35a672df7fcc924bb7cd8f",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const WALLET_KEY = 'loke-wallet-v2';
    const BET = 10;
    const SEED = { adam: 100, paulo: 100, sophia: 100 };
    const NAMES = ['adam', 'paulo', 'sophia'];

    // --- Wallet ---
    function getBalance() {
      const v = localStorage.getItem(WALLET_KEY);
      return v !== null ? parseInt(v) : 100;
    }

    function deductBalance() {
      const bal = getBalance();
      if (bal < BET) return false;
      localStorage.setItem(WALLET_KEY, bal - BET);
      return true;
    }

    // --- Render ---
    let liveScores = null;

    function calcProbs(scores) {
      const total = scores.adam + scores.paulo + scores.sophia;
      const a = Math.round((scores.adam / total) * 100);
      const p = Math.round((scores.paulo / total) * 100);
      return { adam: a, paulo: p, sophia: 100 - a - p, rawTotal: total };
    }

    function render(scores, traderCount) {
      const bal = getBalance();
      const p = calcProbs(scores);
      const canBet = bal >= BET;

      NAMES.forEach(n => {
        const pct = p[n];
        document.getElementById(`prob-${n}`).textContent = `${pct}%`;
        document.getElementById(`bar-${n}`).style.width = `${pct}%`;
        document.getElementById(`btn-yes-${n}`).disabled = !canBet;
        document.getElementById(`btn-no-${n}`).disabled = !canBet;
      });

      const balEl = document.getElementById('wallet-balance');
      balEl.textContent = `${bal}¢`;
      balEl.classList.toggle('low', bal < 30);

      const betsPlaced = Math.round((p.rawTotal - 300) / BET);
      document.getElementById('total-volume').textContent = betsPlaced > 0 ? `${betsPlaced * BET}¢` : '—';
      document.getElementById('trader-count').textContent = traderCount || '—';
      document.getElementById('status-value').textContent = canBet ? 'Open' : 'Out of funds';

      if (!canBet) {
        document.getElementById('wallet-cost').textContent = 'No funds remaining';
      }
    }

    // --- Firebase listener ---
    const scoresRef = ref(db, 'scores');
    const tradersRef = ref(db, 'traders');
    let traderCount = 0;

    onValue(tradersRef, snap => { traderCount = snap.val() || 0; });

    onValue(scoresRef, snap => {
      const data = snap.val();
      if (data) {
        liveScores = {
          adam: data.adam ?? SEED.adam,
          paulo: data.paulo ?? SEED.paulo,
          sophia: data.sophia ?? SEED.sophia,
        };
      } else {
        liveScores = { ...SEED };
      }
      render(liveScores, traderCount);
    });

    // Track unique trader (once per device)
    const TRADER_KEY = 'loke-trader-v1';
    if (!localStorage.getItem(TRADER_KEY)) {
      localStorage.setItem(TRADER_KEY, '1');
      runTransaction(ref(db, 'traders'), v => (v || 0) + 1);
    }

    // --- Betting ---
    window.placeBet = function(name, side) {
      if (!liveScores) return;
      if (!deductBalance()) { showToast('Out of funds!'); return; }

      const delta = side === 'yes' ? BET : -BET;
      runTransaction(ref(db, `scores/${name}`), current => {
        return Math.max(1, (current ?? SEED[name]) + delta);
      });

      const label = name.charAt(0).toUpperCase() + name.slice(1);
      showToast(`${side === 'yes' ? '+' : '−'}${BET}¢ on ${side === 'yes' ? 'Yes' : 'No'} ${label}`);

      // Optimistic local update
      liveScores[name] = Math.max(1, liveScores[name] + delta);
      render(liveScores, traderCount);
    };

    // --- Toast ---
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // --- Share ---
    window.shareMarket = function() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: 'Next Loke to get married?', url });
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
      }
    };
  </script>
</body>
</html>
