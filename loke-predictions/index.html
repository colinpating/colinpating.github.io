<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Loke Predictions</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222636;
      --border: #2a2e42;
      --green: #00c076;
      --green-dim: #0a2e1f;
      --red: #ef4444;
      --red-dim: #2e0f0f;
      --text: #f0f2f8;
      --muted: #8b90a8;
      --accent: #6c7dff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      background: var(--green-dim);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .market-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .market-meta {
      padding: 12px 20px;
      display: flex;
      gap: 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .meta-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .content {
      padding: 16px 16px 100px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 4px;
    }

    .option-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      transition: border-color 0.15s;
    }

    .option-card.selected-yes { border-color: var(--green); }
    .option-card.selected-no { border-color: var(--red); }

    .option-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .option-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .option-prob {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
    }

    .prob-bar-track {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .prob-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--green);
      transition: width 0.4s ease;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn {
      padding: 11px 0;
      border-radius: 9px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.96); opacity: 0.85; }
    .btn-yes { background: var(--green); color: #fff; }
    .btn-no { background: var(--red); color: #fff; }

    .btn-label { font-size: 13px; font-weight: 700; }
    .btn-price { font-size: 11px; font-weight: 500; opacity: 0.85; }

    .toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .bottom-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .volume-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .volume-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .volume-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .share-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 20px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .share-btn:active { opacity: 0.8; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <span class="logo">Loke Predictions</span>
      <span class="live-badge"><span class="live-dot"></span>Live</span>
    </div>
    <div class="market-title">Next in the Loke family to get married</div>
  </div>

  <div class="market-meta">
    <div class="meta-item">
      <span class="meta-label">Closes</span>
      <span class="meta-value">Dec 31, 2030</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Options</span>
      <span class="meta-value">3</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Volume</span>
      <span class="meta-value" id="total-volume">Loading...</span>
    </div>
  </div>

  <div class="content">
    <div class="section-label">Candidates</div>

    <div class="option-card" id="card-adam">
      <div class="option-top">
        <span class="option-name">Adam</span>
        <span class="option-prob" id="prob-adam">33%</span>
      </div>
      <div class="prob-bar-track">
        <div class="prob-bar-fill" id="bar-adam" style="width:33%"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-yes" onclick="vote('adam','yes')">
          <span class="btn-label">Yes</span>
          <span class="btn-price" id="price-yes-adam">33¢</span>
        </button>
        <button class="btn btn-no" onclick="vote('adam','no')">
          <span class="btn-label">No</span>
          <span class="btn-price" id="price-no-adam">67¢</span>
        </button>
      </div>
    </div>

    <div class="option-card" id="card-paulo">
      <div class="option-top">
        <span class="option-name">Paulo</span>
        <span class="option-prob" id="prob-paulo">33%</span>
      </div>
      <div class="prob-bar-track">
        <div class="prob-bar-fill" id="bar-paulo" style="width:33%"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-yes" onclick="vote('paulo','yes')">
          <span class="btn-label">Yes</span>
          <span class="btn-price" id="price-yes-paulo">33¢</span>
        </button>
        <button class="btn btn-no" onclick="vote('paulo','no')">
          <span class="btn-label">No</span>
          <span class="btn-price" id="price-no-paulo">67¢</span>
        </button>
      </div>
    </div>

    <div class="option-card" id="card-sophia">
      <div class="option-top">
        <span class="option-name">Sophia</span>
        <span class="option-prob" id="prob-sophia">34%</span>
      </div>
      <div class="prob-bar-track">
        <div class="prob-bar-fill" id="bar-sophia" style="width:34%"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-yes" onclick="vote('sophia','yes')">
          <span class="btn-label">Yes</span>
          <span class="btn-price" id="price-yes-sophia">34¢</span>
        </button>
        <button class="btn btn-no" onclick="vote('sophia','no')">
          <span class="btn-label">No</span>
          <span class="btn-price" id="price-no-sophia">66¢</span>
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="bottom-bar">
    <div class="bottom-bar-inner">
      <div class="volume-info">
        <span class="volume-label">Your position</span>
        <span class="volume-value" id="user-position">None</span>
      </div>
      <button class="share-btn" onclick="shareMarket()">Share</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'loke-votes-v1';
    const seed = { adam: 41, paulo: 37, sophia: 44 };

    function loadState() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : { votes: { ...seed }, myPick: null };
      } catch {
        return { votes: { ...seed }, myPick: null };
      }
    }

    function saveState(state) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
    }

    function calcProbs(votes) {
      const total = votes.adam + votes.paulo + votes.sophia;
      return {
        adam: Math.round((votes.adam / total) * 100),
        paulo: Math.round((votes.paulo / total) * 100),
        sophia: 100 - Math.round((votes.adam / total) * 100) - Math.round((votes.paulo / total) * 100),
        total
      };
    }

    function render(state) {
      const p = calcProbs(state.votes);
      ['adam', 'paulo', 'sophia'].forEach(n => {
        const pct = p[n];
        document.getElementById(`prob-${n}`).textContent = `${pct}%`;
        document.getElementById(`bar-${n}`).style.width = `${pct}%`;
        document.getElementById(`price-yes-${n}`).textContent = `${pct}¢`;
        document.getElementById(`price-no-${n}`).textContent = `${100 - pct}¢`;
        const card = document.getElementById(`card-${n}`);
        card.classList.remove('selected-yes', 'selected-no');
        if (state.myPick && state.myPick.name === n) {
          card.classList.add(state.myPick.side === 'yes' ? 'selected-yes' : 'selected-no');
        }
      });
      document.getElementById('total-volume').textContent = `${p.total} votes`;
      if (state.myPick) {
        const name = state.myPick.name.charAt(0).toUpperCase() + state.myPick.name.slice(1);
        document.getElementById('user-position').textContent = `${state.myPick.side.toUpperCase()} on ${name}`;
      } else {
        document.getElementById('user-position').textContent = 'None';
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function vote(name, side) {
      const state = loadState();
      const prev = state.myPick;
      if (prev && prev.side === 'yes') {
        state.votes[prev.name] = Math.max(1, state.votes[prev.name] - 1);
      }
      if (prev && prev.name === name && prev.side === side) {
        state.myPick = null;
        showToast('Position removed');
      } else {
        if (side === 'yes') state.votes[name]++;
        state.myPick = { name, side };
        const label = name.charAt(0).toUpperCase() + name.slice(1);
        showToast(`${side === 'yes' ? 'Yes' : 'No'} on ${label} selected`);
      }
      saveState(state);
      render(state);
    }

    function shareMarket() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: 'Next Loke to get married?', url });
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
      } else {
        showToast('Share: ' + url);
      }
    }

    render(loadState());
  </script>
</body>
</html>
