<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Loke Predictions</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222636;
      --border: #2a2e42;
      --green: #00c076;
      --green-dim: #0a2e1f;
      --red: #ef4444;
      --red-dim: #2e0f0f;
      --text: #f0f2f8;
      --muted: #8b90a8;
      --accent: #6c7dff;
      --amber: #f59e0b;
      --teal: #06b6d4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      background: var(--green-dim);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .live-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .market-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
    }

    .market-meta {
      padding: 12px 20px;
      display: flex;
      gap: 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .meta-item { display: flex; flex-direction: column; gap: 2px; }

    .meta-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .meta-value { font-size: 13px; font-weight: 600; }

    .wallet-banner {
      margin: 16px 16px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wallet-left { display: flex; flex-direction: column; gap: 2px; }

    .wallet-label {
      font-size: 10px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .wallet-balance {
      font-size: 22px;
      font-weight: 800;
      color: var(--green);
      transition: color 0.2s;
    }

    .wallet-balance.low { color: var(--red); }
    .wallet-cost { font-size: 11px; color: var(--muted); }

    .content {
      padding: 12px 16px 110px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 4px;
    }

    .option-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .option-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .option-name { font-size: 18px; font-weight: 700; }
    .option-prob { font-size: 24px; font-weight: 800; }

    .prob-bar-track {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .prob-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .fill-adam { background: var(--accent); }
    .fill-paulo { background: var(--amber); }
    .fill-sophia { background: var(--teal); }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .btn {
      padding: 11px 0;
      border-radius: 9px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn:not(:disabled):active { transform: scale(0.96); opacity: 0.85; }
    .btn-yes { background: var(--green); color: #fff; }
    .btn-no { background: var(--red); color: #fff; }
    .btn-label { font-size: 13px; font-weight: 700; }
    .btn-cost { font-size: 11px; font-weight: 500; opacity: 0.85; }

    /* My bets */
    .bet-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .no-bets-msg { font-size: 12px; color: var(--muted); padding: 2px 4px; }

    .bet-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .chip-yes {
      background: var(--green-dim);
      border: 1px solid var(--green);
      color: var(--green);
    }

    .chip-no {
      background: var(--red-dim);
      border: 1px solid var(--red);
      color: var(--red);
    }

    .chip-undo {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      opacity: 0.6;
      color: inherit;
      padding: 0 2px;
      -webkit-tap-highlight-color: transparent;
    }

    .chip-undo:active { opacity: 1; }

    /* Chart */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .chart-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .chart-wrap {
      width: 100%;
      height: 90px;
      position: relative;
    }

    .chart-no-data {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--muted);
    }

    .chart-svg { width: 100%; height: 100%; }

    .chart-legend {
      display: flex;
      gap: 14px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .bottom-bar-inner { display: flex; align-items: center; justify-content: space-between; }

    .status-info { display: flex; flex-direction: column; gap: 1px; }
    .status-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .status-value { font-size: 14px; font-weight: 700; }

    .share-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 20px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .share-btn:active { opacity: 0.8; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <span class="logo">Loke Predictions</span>
      <span class="live-badge"><span class="live-dot"></span>Live</span>
    </div>
    <div class="market-title">Next in the Loke family to get married</div>
  </div>

  <div class="market-meta">
    <div class="meta-item">
      <span class="meta-label">Closes</span>
      <span class="meta-value">Dec 31, 2030</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Traders</span>
      <span class="meta-value" id="trader-count">—</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Volume</span>
      <span class="meta-value" id="total-volume">—</span>
    </div>
  </div>

  <div class="wallet-banner">
    <div class="wallet-left">
      <span class="wallet-label">Your balance</span>
      <span class="wallet-balance" id="wallet-balance">100¢</span>
    </div>
    <span class="wallet-cost" id="wallet-cost">Each bet costs 10¢</span>
  </div>

  <div class="content">
    <div class="section-label">Candidates</div>

    <div class="option-card">
      <div class="option-top">
        <span class="option-name">Adam</span>
        <span class="option-prob" id="prob-adam">—</span>
      </div>
      <div class="prob-bar-track"><div class="prob-bar-fill fill-adam" id="bar-adam" style="width:0%"></div></div>
      <div class="btn-row">
        <button class="btn btn-yes" id="btn-yes-adam" onclick="placeBet('adam','yes')" disabled>
          <span class="btn-label">Yes</span><span class="btn-cost">10¢</span>
        </button>
        <button class="btn btn-no" id="btn-no-adam" onclick="placeBet('adam','no')" disabled>
          <span class="btn-label">No</span><span class="btn-cost">10¢</span>
        </button>
      </div>
    </div>

    <div class="option-card">
      <div class="option-top">
        <span class="option-name">Paulo</span>
        <span class="option-prob" id="prob-paulo">—</span>
      </div>
      <div class="prob-bar-track"><div class="prob-bar-fill fill-paulo" id="bar-paulo" style="width:0%"></div></div>
      <div class="btn-row">
        <button class="btn btn-yes" id="btn-yes-paulo" onclick="placeBet('paulo','yes')" disabled>
          <span class="btn-label">Yes</span><span class="btn-cost">10¢</span>
        </button>
        <button class="btn btn-no" id="btn-no-paulo" onclick="placeBet('paulo','no')" disabled>
          <span class="btn-label">No</span><span class="btn-cost">10¢</span>
        </button>
      </div>
    </div>

    <div class="option-card">
      <div class="option-top">
        <span class="option-name">Sophia</span>
        <span class="option-prob" id="prob-sophia">—</span>
      </div>
      <div class="prob-bar-track"><div class="prob-bar-fill fill-sophia" id="bar-sophia" style="width:0%"></div></div>
      <div class="btn-row">
        <button class="btn btn-yes" id="btn-yes-sophia" onclick="placeBet('sophia','yes')" disabled>
          <span class="btn-label">Yes</span><span class="btn-cost">10¢</span>
        </button>
        <button class="btn btn-no" id="btn-no-sophia" onclick="placeBet('sophia','no')" disabled>
          <span class="btn-label">No</span><span class="btn-cost">10¢</span>
        </button>
      </div>
    </div>

    <div class="section-label">Your bets</div>
    <div class="bet-chips" id="bet-chips">
      <span class="no-bets-msg" id="no-bets-msg">No bets placed yet</span>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Probability over time</span>
      </div>
      <div class="chart-wrap">
        <div class="chart-no-data" id="chart-no-data">Place a bet to start tracking</div>
        <svg class="chart-svg" id="chart-svg" viewBox="0 0 300 90" preserveAspectRatio="none" style="display:none">
          <polyline id="chart-line-adam" fill="none" stroke="#6c7dff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          <polyline id="chart-line-paulo" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          <polyline id="chart-line-sophia" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#6c7dff"></div>Adam</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Paulo</div>
        <div class="legend-item"><div class="legend-dot" style="background:#06b6d4"></div>Sophia</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="bottom-bar">
    <div class="bottom-bar-inner">
      <div class="status-info">
        <span class="status-label">Status</span>
        <span class="status-value" id="status-value">Connecting…</span>
      </div>
      <button class="share-btn" onclick="shareMarket()">Share</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, ref, onValue, runTransaction, push, query, limitToLast } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const app = initializeApp({
      apiKey: "AIzaSyCqQVsWX_74mmx8bwjBxDAm4xEmIcvR3GM",
      authDomain: "loke-prediction.firebaseapp.com",
      databaseURL: "https://loke-prediction-default-rtdb.firebaseio.com",
      projectId: "loke-prediction",
      storageBucket: "loke-prediction.firebasestorage.app",
      messagingSenderId: "763517146782",
      appId: "1:763517146782:web:35a672df7fcc924bb7cd8f",
    });

    const db = getDatabase(app);

    const WALLET_KEY = 'loke-wallet-v2';
    const BETS_KEY   = 'loke-bets-v2';
    const TRADER_KEY = 'loke-trader-v1';
    const BET  = 10;
    const SEED = { adam: 100, paulo: 100, sophia: 100 };
    const NAMES = ['adam', 'paulo', 'sophia'];

    // ── Wallet ────────────────────────────────────────────
    const getBalance = () => { const v = localStorage.getItem(WALLET_KEY); return v !== null ? +v : 100; };
    const setBalance = v => localStorage.setItem(WALLET_KEY, v);

    // ── Bets (local) ─────────────────────────────────────
    const getBets  = () => { try { return JSON.parse(localStorage.getItem(BETS_KEY) || '[]'); } catch { return []; } };
    const saveBets = b => localStorage.setItem(BETS_KEY, JSON.stringify(b));

    // ── Probabilities ─────────────────────────────────────
    function scoreToProbs(scores) {
      const total = scores.adam + scores.paulo + scores.sophia;
      const a = Math.round((scores.adam  / total) * 100);
      const p = Math.round((scores.paulo / total) * 100);
      return { adam: a, paulo: p, sophia: 100 - a - p };
    }

    // ── Render candidates ────────────────────────────────
    let liveScores = null;
    let traderCount = 0;
    let liveVolume = 0;

    function renderCandidates() {
      if (!liveScores) return;
      const probs = scoreToProbs(liveScores);
      const canBet = getBalance() >= BET;

      NAMES.forEach(n => {
        const pct = probs[n];
        document.getElementById(`prob-${n}`).textContent = `${pct}%`;
        document.getElementById(`bar-${n}`).style.width   = `${pct}%`;
        document.getElementById(`btn-yes-${n}`).disabled  = !canBet;
        document.getElementById(`btn-no-${n}`).disabled   = !canBet;
      });

      const bal = getBalance();
      const balEl = document.getElementById('wallet-balance');
      balEl.textContent = `${bal}¢`;
      balEl.classList.toggle('low', bal < 30);
      document.getElementById('wallet-cost').textContent = canBet ? 'Each bet costs 10¢' : 'No funds remaining';

      document.getElementById('total-volume').textContent = liveVolume > 0 ? `${liveVolume}¢` : '—';
      document.getElementById('trader-count').textContent = traderCount || '—';
      document.getElementById('status-value').textContent = canBet ? 'Open' : 'Out of funds';
    }

    // ── Render bet chips ─────────────────────────────────
    function renderBets() {
      const bets = getBets();
      const container = document.getElementById('bet-chips');
      const noMsg = document.getElementById('no-bets-msg');

      if (bets.length === 0) {
        container.innerHTML = '';
        container.appendChild(noMsg);
        noMsg.style.display = 'block';
        return;
      }

      noMsg.style.display = 'none';
      container.innerHTML = '';

      bets.forEach((bet, i) => {
        const chip = document.createElement('div');
        chip.className = `bet-chip ${bet.side === 'yes' ? 'chip-yes' : 'chip-no'}`;
        const label = bet.name.charAt(0).toUpperCase() + bet.name.slice(1);
        chip.innerHTML = `
          <span>${bet.side === 'yes' ? 'Yes' : 'No'} ${label}</span>
          <button class="chip-undo" onclick="undoBet(${i})" title="Undo bet">×</button>
        `;
        container.appendChild(chip);
      });
    }

    // ── Chart ─────────────────────────────────────────────
    let historyPoints = [];

    function renderChart() {
      const noData = document.getElementById('chart-no-data');
      const svg    = document.getElementById('chart-svg');

      if (historyPoints.length < 2) {
        noData.style.display = 'flex';
        svg.style.display = 'none';
        return;
      }

      noData.style.display = 'none';
      svg.style.display = 'block';

      const W = 300, H = 90, PAD = 3;
      const ts = historyPoints.map(p => p.t);
      const minT = Math.min(...ts), maxT = Math.max(...ts);
      const tRange = maxT - minT || 1;

      const toX = t => PAD + ((t - minT) / tRange) * (W - 2 * PAD);
      const toY = pct => H - PAD - ((pct / 100) * (H - 2 * PAD));

      NAMES.forEach(n => {
        const pts = historyPoints.map(p => `${toX(p.t).toFixed(1)},${toY(p[n]).toFixed(1)}`).join(' ');
        document.getElementById(`chart-line-${n}`).setAttribute('points', pts);
      });
    }

    let lastHistoryWrite = 0;
    function maybeWriteHistory(scores) {
      const now = Date.now();
      if (now - lastHistoryWrite < 2000) return;
      lastHistoryWrite = now;
      const probs = scoreToProbs(scores);
      push(ref(db, 'history'), { adam: probs.adam, paulo: probs.paulo, sophia: probs.sophia, t: now });
    }

    // ── Firebase listeners ────────────────────────────────
    onValue(ref(db, 'scores'), snap => {
      const d = snap.val();
      liveScores = d
        ? { adam: d.adam ?? SEED.adam, paulo: d.paulo ?? SEED.paulo, sophia: d.sophia ?? SEED.sophia }
        : { ...SEED };
      renderCandidates();
    });

    onValue(ref(db, 'traders'), snap => { traderCount = snap.val() || 0; renderCandidates(); });
    onValue(ref(db, 'volume'),  snap => { liveVolume  = snap.val() || 0; renderCandidates(); });

    onValue(query(ref(db, 'history'), limitToLast(40)), snap => {
      historyPoints = [];
      snap.forEach(child => { historyPoints.push(child.val()); });
      historyPoints.sort((a, b) => a.t - b.t);
      renderChart();
    });

    // Track unique traders
    if (!localStorage.getItem(TRADER_KEY)) {
      localStorage.setItem(TRADER_KEY, '1');
      runTransaction(ref(db, 'traders'), v => (v || 0) + 1);
    }

    // ── Place bet ─────────────────────────────────────────
    window.placeBet = function(name, side) {
      const bal = getBalance();
      if (bal < BET) { showToast('Out of funds!'); return; }

      setBalance(bal - BET);

      const delta = side === 'yes' ? BET : -BET;
      runTransaction(ref(db, `scores/${name}`), cur => Math.max(1, (cur ?? SEED[name]) + delta));
      runTransaction(ref(db, 'volume'), v => (v || 0) + BET);

      const bets = getBets();
      bets.push({ name, side });
      saveBets(bets);

      if (liveScores) {
        liveScores[name] = Math.max(1, liveScores[name] + delta);
        maybeWriteHistory(liveScores);
      }

      const label = name.charAt(0).toUpperCase() + name.slice(1);
      showToast(`${side === 'yes' ? '+' : '−'}10¢ on ${side === 'yes' ? 'Yes' : 'No'} ${label}`);

      renderCandidates();
      renderBets();
    };

    // ── Undo bet ──────────────────────────────────────────
    window.undoBet = function(i) {
      const bets = getBets();
      const bet = bets[i];
      if (!bet) return;

      // Reverse Firebase
      const delta = bet.side === 'yes' ? -BET : BET;
      runTransaction(ref(db, `scores/${bet.name}`), cur => Math.max(1, (cur ?? SEED[bet.name]) + delta));
      runTransaction(ref(db, 'volume'), v => Math.max(0, (v || 0) - BET));

      // Refund wallet
      setBalance(getBalance() + BET);

      // Remove from local history
      bets.splice(i, 1);
      saveBets(bets);

      if (liveScores) {
        liveScores[bet.name] = Math.max(1, liveScores[bet.name] + delta);
        maybeWriteHistory(liveScores);
      }

      const label = bet.name.charAt(0).toUpperCase() + bet.name.slice(1);
      showToast(`Undid ${bet.side === 'yes' ? 'Yes' : 'No'} on ${label} — 10¢ refunded`);

      renderCandidates();
      renderBets();
    };

    // ── Toast ─────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ── Share ─────────────────────────────────────────────
    window.shareMarket = function() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: 'Next Loke to get married?', url });
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
      }
    };

    // Initial local render
    renderBets();
  </script>
</body>
</html>
